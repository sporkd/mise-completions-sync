# Development tools for mise-completions-sync
[tools]
rust = "latest"
uv = "latest"
prek = "latest"

[env]
_.path = "./bin"

[tasks.build]
run = "cargo build --release"
description = "Build the release binary"

[tasks.test]
run = "cargo test -- --test-threads=1"
description = "Run tests"

[tasks.lint]
run = "cargo clippy -- -D warnings"
description = "Run clippy lints"

[tasks.format]
run = "cargo fmt"
description = "Format code"

[tasks.generate-registry]
run = "uv run scripts/generate-registry.py"
description = "Generate registry.toml from mise's registry"

[tasks.install-dev]
run = "cargo install --path . --root ."
description = "Install locally for testing"

[tasks.install-hooks]
run = "prek install"
description = "Install pre-commit hooks"

[tasks.docs-tools]
run = "uv run scripts/generate-tools-docs.py > docs/tools.md"
description = "Generate tools documentation from registry"

[tasks.docs-status]
run = "uv run scripts/generate-tools-status.py > TOOLS.md"
description = "Generate TOOLS.md with supported and pending tools"

[tasks.validate-registry]
run = "uv run scripts/validate-registry.py --installed-only"
description = "Validate registry entries against installed tools"
